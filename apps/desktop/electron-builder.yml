appId: dev.sada.app
productName: Sada
copyright: Copyright © 2026 Sada contributors
directories:
  output: release
  buildResources: build
files:
  - out/**
  - "!**/*.map"
# ffmpeg/ffprobe ship as per-OS native binaries; keep them unpacked so they are
# executable at runtime, and resolve the .unpacked path in main/ffmpeg.js.
asarUnpack:
  - "**/@ffmpeg-installer/**"
  - "**/@ffprobe-installer/**"
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.png
# The portable exe installs nothing and registers no uninstaller. Give it a clearly
# different name so it can't be mistaken for the installer (Sada-Portable-x.y.z.exe).
portable:
  artifactName: ${productName}-Portable-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Installer registers an uninstaller in Add/Remove Programs and Start Menu.
  artifactName: ${productName}-Setup-${version}.${ext}
  uninstallDisplayName: Sada · صدى
  createDesktopShortcut: true
  createStartMenuShortcut: true
  menuCategory: Sada
  # Keep the user's saved Wit.ai token / settings if they reinstall later.
  deleteAppDataOnUninstall: false
  # Adds an explicit "Uninstall Sada" Start Menu shortcut (see build/installer.nsh).
  include: build/installer.nsh
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: build/icon.png
  category: public.app-category.productivity
linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: AudioVideo
  # The npm package is scoped (@sada/desktop); override the artifact name and
  # executable so Linux packaging doesn't put a "/" in output paths.
  executableName: sada
  maintainer: Sada contributors <helghareeb@users.noreply.github.com>
  artifactName: ${productName}-${version}-${arch}.${ext}
# No code-signing configured by default — builds are unsigned. See docs/BUILD.md.
