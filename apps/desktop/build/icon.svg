<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Speech / subtitle bubble -->
  <g>
    <rect x="96" y="120" width="320" height="200" rx="46" fill="#ffffff"/>
    <path d="M150 300 L150 384 L228 300 Z" fill="#ffffff"/>
  </g>

  <!-- Left: audio waveform bars (teal) -->
  <g fill="#0d9488">
    <rect x="138" y="194" width="18" height="52" rx="9"/>
    <rect x="168" y="172" width="18" height="96" rx="9"/>
    <rect x="198" y="186" width="18" height="68" rx="9"/>
  </g>

  <!-- Right: text lines the audio resolves into (indigo) -->
  <g fill="#6366f1">
    <rect x="246" y="181" width="140" height="18" rx="9"/>
    <rect x="246" y="211" width="140" height="18" rx="9"/>
    <rect x="246" y="241" width="96"  height="18" rx="9"/>
  </g>
</svg>
