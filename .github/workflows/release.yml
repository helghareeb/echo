name: Release

# Build cross-platform desktop installers when a version tag is pushed.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build desktop installers
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing secrets are read into SIGN_* and only promoted to the real
          # electron-builder vars when non-empty — so builds are signed if a
          # certificate is configured, and cleanly unsigned otherwise.
          SIGN_CSC_LINK: ${{ secrets.CSC_LINK }}
          SIGN_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          SIGN_APPLE_ID: ${{ secrets.APPLE_ID }}
          SIGN_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          SIGN_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$SIGN_CSC_LINK" ]; then
            export CSC_LINK="$SIGN_CSC_LINK"
            export CSC_KEY_PASSWORD="$SIGN_CSC_KEY_PASSWORD"
          fi
          if [ -n "$SIGN_APPLE_ID" ]; then
            export APPLE_ID="$SIGN_APPLE_ID"
            export APPLE_APP_SPECIFIC_PASSWORD="$SIGN_APPLE_APP_SPECIFIC_PASSWORD"
            export APPLE_TEAM_ID="$SIGN_APPLE_TEAM_ID"
          fi
          pnpm --filter @sada/desktop dist
      - name: Attach installers to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
          fail_on_unmatched_files: false
      - name: Upload build artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: sada-${{ matrix.os }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.deb
          if-no-files-found: ignore
